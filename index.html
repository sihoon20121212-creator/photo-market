<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SH Gallery</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background:#111; color:white; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:25px; padding:20px; }
        .card { background:#1e1e1e; border-radius:15px; padding:15px; }
        .buy-btn { width:100%; padding:10px; background:#2196F3; border:none; border-radius:8px; color:white; cursor:pointer; }
    </style>
</head>
<body>

<div id="gallery" class="grid"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBL1R4PV4ZQum_i8HHhdaama4Va4DrAHyA",
        authDomain: "sh-gallery-c84d2.firebaseapp.com",
        projectId: "sh-gallery-c84d2",
        storageBucket: "sh-gallery-c84d2.firebasestorage.app",
        messagingSenderId: "1082517064048",
        appId: "1:1082517064048:web:18e97377dea38899c2e7b5",
        measurementId: "G-NM0VP2JQTT"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.collection("photos").onSnapshot(snapshot => {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";
        snapshot.forEach(doc => {
            const p = doc.data();
            const id = doc.id;
            gallery.innerHTML += `
                <div class="card">
                    <img src="${p.Image}" style="width:100%; height:200px; object-fit:cover;">
                    <h3>${p.Title}</h3>
                    <p>₩ ${p.Price}</p>
                    <button class="buy-btn" onclick="window.open('https://www.instagram.com/sh.market.1/')">구매 문의</button>
                    <div style="margin-top:10px">
                        <button onclick="addLike('${id}', ${p.Likes})">❤️ ${p.Likes}</button>
                        <div style="font-size:0.8rem; margin:5px 0;">${(p.Comment || []).map(c => `<p>• ${c}</p>`).join('')}</div>
                        <input id="cmt-${id}" placeholder="댓글 입력..." style="width:70%">
                        <button onclick="addComment('${id}')">등록</button>
                    </div>
                </div>
            `;
        });
    });

    function addLike(id, currentLikes) {
        db.collection("photos").doc(id).update({ Likes: currentLikes + 1 });
    }

    function addComment(id) {
        const input = document.getElementById('cmt-'+id);
        if(!input.value) return;
        db.collection("photos").doc(id).update({
            Comment: firebase.firestore.FieldValue.arrayUnion(input.value)
        });
        input.value = '';
    }
</script>
</body>
</html>
