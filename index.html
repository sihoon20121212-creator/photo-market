<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH Market - 사진과 중고거래</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: #111; color: white; padding-bottom: 50px; }
        header { padding: 40px 20px; text-align: center; background: #1b1b1b; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .search { width: 100%; padding: 15px; border: none; border-radius: 10px; margin-bottom: 20px; font-size: 1rem; }
        .form { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; background: #333; color: white; }
        button { width: 100%; padding: 15px; margin-top: 15px; background: #4CAF50; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #45a049; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; border-radius: 15px; overflow: hidden; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; }
        .price { color: #4CAF50; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>📸 SH Market</h1>
    <p>사진과 중고물품을 사고파는 공간</p>
</header>

<div class="container">
    <input type="text" class="search" placeholder="상품명으로 검색하세요..." onkeyup="searchItems(this.value)">

    <div class="form">
        <select id="type"><option>사진</option><option>중고거래</option></select>
        <input id="title" placeholder="제목을 입력하세요">
        <input id="price" placeholder="가격을 입력하세요 (예: 50000)">
        <input id="image" placeholder="이미지 URL을 입력하세요">
        <button onclick="addItem()">등록하기</button>
    </div>

    <div id="items" class="grid"></div>
</div>

<script>
    // 1. 페이지 로드 시 저장된 데이터 불러오기
    let items = JSON.parse(localStorage.getItem('shMarketItems')) || [];
    render(items);

    function addItem() {
        let title = document.getElementById('title');
        let price = document.getElementById('price');
        let image = document.getElementById('image');
        let type = document.getElementById('type');

        if(!title.value || !price.value) {
            alert("제목과 가격은 필수입니다!");
            return;
        }

        let item = {
            type: type.value,
            title: title.value,
            price: price.value,
            image: image.value || 'https://via.placeholder.com/250'
        };

        items.push(item);
        
        // 2. 데이터 저장하기
        localStorage.setItem('shMarketItems', JSON.stringify(items));
        
        render(items);

        title.value = '';
        price.value = '';
        image.value = '';
    }

    function render(data) {
        let html = '';
        data.forEach(item => {
            html += `
            <div class="card">
                <img src="${item.image}" alt="상품이미지" onerror="this.src='https://via.placeholder.com/250'">
                <div class="card-content">
                    <h3>${item.title}</h3>
                    <p style="color:#888; font-size:0.8rem;">${item.type}</p>
                    <p class="price">₩ ${parseInt(item.price).toLocaleString()}</p>
                </div>
            </div>`;
        });
        document.getElementById('items').innerHTML = html;
    }

    function searchItems(keyword) {
        let filtered = items.filter(item => item.title.toLowerCase().includes(keyword.toLowerCase()));
        render(filtered);
    }
</script>

</body>
</html>
