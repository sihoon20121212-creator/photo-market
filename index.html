<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH Gallery</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        h3 { margin: 0 0 10px 0; }
        p { margin: 0; color: #ccc; }
    </style>
</head>
<body>

<div id="gallery">로딩 중...</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBL1R4PV4ZQum_i8HHhdaama4Va4DrAHyA",
        authDomain: "sh-gallery-c84d2.firebaseapp.com",
        projectId: "sh-gallery-c84d2",
        storageBucket: "sh-gallery-c84d2.firebasestorage.app",
        messagingSenderId: "1082517064048",
        appId: "1:1082517064048:web:18e97377dea38899c2e7b5",
        measurementId: "G-NM0VP2JQTT"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 데이터 가져오기 (소문자 photos 컬렉션)
    db.collection("photos").onSnapshot(snapshot => {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = ""; 
        
        snapshot.forEach(doc => {
            const p = doc.data();
            // 이미지, 제목, 가격만 표시
            gallery.innerHTML += `
                <div class="card">
                    <img src="${p.image}">
                    <h3>${p.title}</h3>
                    <p>가격: ${p.price}원</p>
                </div>
            `;
        });
    });
</script>
</body>
</html>
