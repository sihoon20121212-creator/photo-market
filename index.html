<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH Market - 이미지 검증 완료</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: #111; color: white; padding-bottom: 50px; }
        header { padding: 30px 20px; text-align: center; background: #1b1b1b; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        .search-box { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: none; background: #333; color: white; font-size: 1rem; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: #333; border: none; color: white; border-radius: 8px; cursor: pointer; }
        .tab-btn.active { background: #4CAF50; }

        .admin-box { background: #2c3e50; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .admin-status { background: #1b5e20; padding: 10px; border-radius: 10px; margin-bottom: 20px; text-align: center; color: #a5d6a7; font-weight: bold; }
        
        .form { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; background: #333; color: white; }
        button { width: 100%; padding: 15px; margin-top: 15px; background: #4CAF50; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: #1e1e1e; border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-content { padding: 12px; }
        .del-btn { background: #ff4757; width: 100%; padding: 8px; margin-top: 10px; border: none; color: white; border-radius: 5px; cursor: pointer; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; z-index: 999; }
    </style>
</head>
<body>

<header><h1>📸 SH Market</h1></header>

<div class="container">
    <div id="adminLoginArea" class="admin-box">
        <input type="password" id="adminInput" placeholder="관리자 비밀번호 (30분 유지)">
        <button onclick="loginAdmin()" style="background:#2196F3; margin-top:10px;">관리자 권한 획득</button>
    </div>
    
    <div id="adminStatusArea" class="admin-status" style="display:none;">✅ 관리자 권한 활성화 중 (30분 유지)</div>

    <input type="text" id="searchInput" class="search-box" placeholder="상품명으로 검색..." onkeyup="render()">

    <div class="tabs">
        <button class="tab-btn active" onclick="filterItems('전체', this)">전체</button>
        <button class="tab-btn" onclick="filterItems('사진', this)">사진</button>
        <button class="tab-btn" onclick="filterItems('중고거래', this)">중고거래</button>
    </div>

    <div class="form">
        <select id="type"><option>사진</option><option>중고거래</option></select>
        <input id="title" placeholder="제목">
        <input type="number" id="price" placeholder="가격 (숫자만)">
        <input id="image" placeholder="이미지 URL">
        <input type="password" id="itemPassword" placeholder="삭제용 비밀번호">
        <button onclick="addItem()">상품 등록하기</button>
    </div>

    <div id="items" class="grid"></div>
</div>

<div id="toast">알림 메시지</div>

<script>
    const ADMIN_PASS = "ghfkddl";
    let items = JSON.parse(localStorage.getItem('shMarketItems')) || [];
    let currentFilter = '전체';

    function isAdmin() {
        let expiry = localStorage.getItem('adminExpiry');
        return expiry && new Date().getTime() < parseInt(expiry);
    }

    function loginAdmin() {
        if(document.getElementById('adminInput').value === ADMIN_PASS) {
            localStorage.setItem('adminExpiry', new Date().getTime() + (30 * 60 * 1000));
            showToast("관리자 권한 30분 활성화!");
            render();
        } else {
            showToast("비밀번호 오류");
        }
    }

    function showToast(msg) {
        let t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function filterItems(type, btn) {
        currentFilter = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function addItem() {
        let title = document.getElementById('title').value;
        let password = document.getElementById('itemPassword').value;
        let imageUrl = document.getElementById('image').value || 'https://via.placeholder.com/250';

        if(!title || !password) { showToast("제목과 비밀번호는 필수입니다!"); return; }

        let img = new Image();
        img.onload = function() {
            items.push({
                id: Date.now(),
                type: document.getElementById('type').value,
                title: title,
                price: document.getElementById('price').value,
                image: imageUrl,
                password: password
            });
            localStorage.setItem('shMarketItems', JSON.stringify(items));
            showToast("상품이 등록되었습니다!");
            document.getElementById('title').value = '';
            document.getElementById('itemPassword').value = '';
            render();
        };
        img.onerror = function() {
            showToast("이미지 주소가 잘못되었습니다. 다시 확인해주세요!");
        };
        img.src = imageUrl;
    }

    function deleteItem(id) {
        let item = items.find(i => i.id === id);
        if (isAdmin() || prompt("비밀번호 입력:") === item.password) {
            items = items.filter(i => i.id !== id);
            localStorage.setItem('shMarketItems', JSON.stringify(items));
            showToast("삭제되었습니다.");
            render();
        } else {
            showToast("권한 없음!");
        }
    }

    function render() {
        document.getElementById('adminLoginArea').style.display = isAdmin() ? 'none' : 'block';
        document.getElementById('adminStatusArea').style.display = isAdmin() ? 'block' : 'none';

        let keyword = document.getElementById('searchInput').value.toLowerCase();
        let filtered = items.filter(i => 
            (currentFilter === '전체' || i.type === currentFilter) &&
            (i.title.toLowerCase().includes(keyword))
        );

        let html = filtered.map(item => `
            <div class="card">
                <img src="${item.image}" onerror="this.src='https://via.placeholder.com/250'">
                <div class="card-content">
                    <h3 style="font-size:0.9rem;">${item.title}</h3>
                    <p style="color:#4CAF50; font-weight:bold;">₩ ${parseInt(item.price).toLocaleString()}</p>
                    <button class="del-btn" onclick="deleteItem(${item.id})">삭제</button>
                </div>
            </div>`).join('');
        document.getElementById('items').innerHTML = html || '<p>검색 결과가 없습니다.</p>';
    }

    render();
</script>
</body>
</html>
