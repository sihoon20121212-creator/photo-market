<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH Gallery - 공식 스토어</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Pretendard', sans-serif; }
        body { background:#111; color:white; }
        header { padding:50px 20px; text-align:center; background:#181818; }
        .container { max-width:1000px; margin:auto; padding:20px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:25px; }
        .card { background:#1e1e1e; border-radius:15px; overflow:hidden; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width:100%; height:200px; object-fit:cover; }
        .card-content { padding:15px; }
        .price { color:#4CAF50; font-weight:bold; font-size: 1.1rem; margin: 10px 0; }
        .buy-btn { width:100%; padding:12px; background:#2196F3; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold; }
        .buy-btn:hover { background:#1976D2; }
    </style>
</head>
<body>

<header>
    <h1>📸 SH Gallery</h1>
    <p>공식 사진 스토어</p>
</header>

<div class="container">
    <div id="gallery" class="grid"></div>
</div>

<script>
    /**
     * [관리자 전용] 
     * 여기에 사진 정보를 추가하세요. 
     * 형식: { title: "민들레 홀씨", price: 500, image: "1780575171750.jpg" },
     */
    const photos = [{ title: "민들레 홀씨", price: 500, image: "1780575171750.jpg" },
        { title: "노을진 바다", price: 5000, image: "https://picsum.photos/600/400?1" },
        { title: "숲속 사슴", price: 7000, image: "https://picsum.photos/600/400?2" },
        { title: "도심 야경", price: 10000, image: "https://picsum.photos/600/400?3" }
    ];

    function purchase(title) {
        // 인스타그램으로 연결
        window.open("https://www.instagram.com/sh.market.1/");
        alert(`"${title}" 구매 문의를 위해 인스타그램으로 이동합니다.\nDM으로 문의 내용을 보내주세요!`);
    }

    function render() {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = photos.map(p => `
            <div class="card">
                <img src="${p.image}" alt="${p.title}">
                <div class="card-content">
                    <h3>${p.title}</h3>
                    <p class="price">₩ ${p.price.toLocaleString()}</p>
                    <button class="buy-btn" onclick="purchase('${p.title}')">구매 문의하기</button>
                </div>
            </div>
        `).join("");
    }

    render();
</script>
</body>
</html>
