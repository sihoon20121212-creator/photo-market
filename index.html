<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH Gallery</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        h3 { margin: 0 0 10px 0; }
        p { margin: 0; color: #ccc; }
    </style>
</head>
<body>

<div id="gallery">로딩 중...</div>

<script>

const firebaseConfig = {
   ...
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("photos").onSnapshot(snapshot => {

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    snapshot.forEach(doc => {

        const p = doc.data();

        gallery.innerHTML += `
        <div class="card">
            <img src="${p.Image}" onerror="this.style.display='none'">
            <h3>${p.Title}</h3>
            <p>가격: ${p.Price}원</p>
        </div>
        `;

    });

});

</script>
</body>
</html>
