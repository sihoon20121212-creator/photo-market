<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH Market - 관리자 전용</title>
    <style>
        /* 기존 스타일 유지 + 삭제 버튼 스타일 추가 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: #111; color: white; padding-bottom: 50px; }
        header { padding: 40px 20px; text-align: center; background: #1b1b1b; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .form { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        input, select { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; background: #333; color: white; }
        button { width: 100%; padding: 15px; margin-top: 15px; background: #4CAF50; border: none; color: white; border-radius: 8px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1e1e1e; border-radius: 15px; overflow: hidden; position: relative; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; }
        .del-btn { background: #ff4757; padding: 5px 10px; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>📸 SH Market</h1>
    <p>관리자 전용 마켓 페이지</p>
</header>

<div class="container">
    <div class="form">
        <input type="password" id="adminPass" placeholder="관리자 비밀번호를 입력하세요">
        <select id="type"><option>사진</option><option>중고거래</option></select>
        <input id="title" placeholder="제목">
        <input id="price" placeholder="가격">
        <input id="image" placeholder="이미지 URL">
        <button onclick="addItem()">상품 등록하기</button>
    </div>

    <div id="items" class="grid"></div>
</div>

<script>
    const ADMIN_PASSWORD = "ghfkddl"; // 여기에 원하는 비밀번호를 설정하세요
    let items = JSON.parse(localStorage.getItem('shMarketItems')) || [];
    render(items);

    function checkAdmin() {
        let pass = document.getElementById('adminPass').value;
        return pass === ADMIN_PASSWORD;
    }

    function addItem() {
        if(!checkAdmin()) { alert("비밀번호가 틀렸습니다!"); return; }

        let item = {
            id: Date.now(), // 삭제를 위한 고유 ID
            type: document.getElementById('type').value,
            title: document.getElementById('title').value,
            price: document.getElementById('price').value,
            image: document.getElementById('image').value || 'https://via.placeholder.com/250'
        };

        items.push(item);
        localStorage.setItem('shMarketItems', JSON.stringify(items));
        render(items);
    }

    function deleteItem(id) {
        if(!checkAdmin()) { alert("비밀번호가 틀렸습니다!"); return; }
        items = items.filter(item => item.id !== id);
        localStorage.setItem('shMarketItems', JSON.stringify(items));
        render(items);
    }

    function render(data) {
        let html = '';
        data.forEach(item => {
            html += `
            <div class="card">
                <img src="${item.image}" onerror="this.src='https://via.placeholder.com/250'">
                <div class="card-content">
                    <h3>${item.title}</h3>
                    <p>${item.type}</p>
                    <p>₩ ${parseInt(item.price).toLocaleString()}</p>
                    <button class="del-btn" onclick="deleteItem(${item.id})">삭제</button>
                </div>
            </div>`;
        });
        document.getElementById('items').innerHTML = html;
    }
</script>

</body>
</html>
