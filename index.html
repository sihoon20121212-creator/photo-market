<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SH Market - 승인제 운영</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #222; padding: 15px; border-radius: 10px; }
        .admin-panel { background: #333; padding: 20px; margin-top: 50px; border-radius: 10px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<h1>📸 SH Market (승인제)</h1>

<!-- 사용자 등록 폼 -->
<div class="form">
    <h3>상품 등록 신청</h3>
    <input id="title" placeholder="제목">
    <input id="price" placeholder="가격">
    <input id="image" placeholder="이미지 URL">
    <button onclick="requestItem()">등록 신청하기</button>
</div>

<!-- 승인된 상품 목록 -->
<div id="items" class="grid"></div>

<!-- 운영자 전용 승인 패널 -->
<div class="admin-panel">
    <h3>운영자 승인 대기함 (비밀번호 필요)</h3>
    <input type="password" id="adminPass" placeholder="관리자 비밀번호">
    <div id="pendingItems"></div>
</div>

<script>
    const ADMIN_PASS = "ghfkddl"; // 비밀번호
    let items = JSON.parse(localStorage.getItem('shMarketItems')) || [];

    // 1. 등록 신청 (status: 'pending')
    function requestItem() {
        let item = {
            id: Date.now(),
            title: document.getElementById('title').value,
            price: document.getElementById('price').value,
            image: document.getElementById('image').value,
            status: 'pending' // 승인 대기 상태
        };
        items.push(item);
        saveAndRender();
        alert("등록이 신청되었습니다. 운영자의 승인을 기다려주세요!");
    }

    // 2. 운영자 승인 함수
    function approveItem(id) {
        let pass = document.getElementById('adminPass').value;
        if(pass !== ADMIN_PASS) { alert("비밀번호 오류"); return; }
        
        items = items.map(item => item.id === id ? {...item, status: 'approved'} : item);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('shMarketItems', JSON.stringify(items));
        render();
    }

    function render() {
        // 일반 목록 (승인된 것만)
        document.getElementById('items').innerHTML = items
            .filter(i => i.status === 'approved')
            .map(i => `<div class="card"><h3>${i.title}</h3><p>₩${i.price}</p></div>`).join('');

        // 운영자 대기 목록
        document.getElementById('pendingItems').innerHTML = items
            .filter(i => i.status === 'pending')
            .map(i => `<div>${i.title} <button onclick="approveItem(${i.id})">승인하기</button></div>`).join('');
    }

    render();
</script>
</body>
</html>
